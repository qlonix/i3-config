# ==========================================
# i3status ダークテーマ用設定
# ==========================================

general {
        colors = true
        color_good = "#CDD6F4"      # 正常時 (くっきりホワイト)
        color_degraded = "#F9E2AF"  # 注意時 (イエロー)
        color_bad = "#F38BA8"       # 警告時 (レッド)
        interval = 2
}

order += "volume master"
order += "disk /"
order += "wireless _first_"
order += "ethernet _first_"
order += "cpu_usage"
order += "memory"
order += "battery all"
order += "tztime local"

volume master {
        format = "🔊 音量: %volume"
        format_muted = "🔇 消音"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}

disk "/" {
        format = "💾 空き容量: %avail"
}

wireless _first_ {
        format_up = "📡 Wi-Fi: %ip (%essid %quality)"
        format_down = "📡 Wi-Fi: 未接続"
}

ethernet _first_ {
        format_up = "🌐 有線: %ip"
        format_down = "🌐 有線: 未接続"
}

cpu_usage {
        format = "⚡ CPU: %usage"
}

memory {
        format = "🧠 メモリ: %used / %total"
        threshold_degraded = "10%"
        format_degraded = "🧠 メモリ残量低下: %free"
}

battery all {
        format = "🔋 バッテリー: %percentage (%remaining)"
        format_down = ""
        status_chr = "⚡ 充電中"
        status_bat = "🔋 放電中"
        status_unk = "❓ 不明"
        status_full = "🔌 満充電"
        path = "/sys/class/power_supply/BAT%d/uevent"
        low_threshold = 15
}

tztime local {
        format = "📅 %Y年%m月%d日(%a) 🕒 %H:%M:%S"
}
